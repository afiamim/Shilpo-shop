{% extends 'base.html' %}
{% block title %}Delete Product - ShilpoShop{% endblock %}

{% block content %}
<div class="confirm-box">
    <h2>Delete Product</h2>
    <p>
        Are you sure you want to delete <strong>{{ product.product_name }}</strong>?
        This action cannot be undone.
    </p>
    <form method="POST">
        {% csrf_token %}
        <div class="flex gap-1">
            <button type="submit" class="btn btn-red">Yes, Delete</button>
            <a href="{% url 'product_list' %}" class="btn btn-gray">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
